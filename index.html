<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>App Lápiz - Web de Dibujo</title>
    <link href="/style.css" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
      /* Custom styles to augment Tailwind */
      .glass-panel {
        background: rgba(24, 24, 27, 0.85);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 10px 40px -10px rgba(0,0,0,0.3);
      }
      .tool-btn {
        transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .tool-btn:hover {
        transform: translateY(-2px);
      }
      .tool-btn:active {
        transform: translateY(0);
      }
    </style>
  </head>
  <body class="bg-gray-100 h-screen w-screen overflow-hidden font-sans text-gray-100 selection:bg-purple-500/30">
    
    <!-- Canvas Container (Background) -->
    <main id="canvasContainer" class="fixed inset-0 w-full h-full cursor-crosshair z-0">
      <!-- We can add a subtle dot pattern to the background -->
      <div class="absolute inset-0 pointer-events-none opacity-50" style="background-image: radial-gradient(#cbd5e1 1px, transparent 1px); background-size: 20px 20px;"></div>
      <canvas id="c"></canvas>
    </main>

    <!-- Top Navigation & Properties -->
    <header class="fixed top-4 left-4 right-4 z-10 glass-panel rounded-2xl px-4 py-2 flex items-center justify-between pointer-events-auto shadow-lg overflow-x-auto scrollbar-hide">
      
      <!-- Left: Brand & Status -->
      <div class="flex items-center gap-4 shrink-0">
        <h1 class="text-lg font-bold text-white tracking-tight flex items-center gap-2">
          <i data-lucide="pen-tool" class="w-5 h-5 text-purple-400"></i>
          App Lápiz
        </h1>
        <div id="statusIndicator" class="text-xs text-green-400 font-medium flex items-center gap-1.5 hidden lg:flex">
          <div class="w-1.5 h-1.5 rounded-full bg-green-400 animate-pulse"></div>
          Listo
        </div>
      </div>

      <div class="w-px h-6 bg-white/10 mx-4 shrink-0"></div>

      <!-- Center: Properties -->
      <div class="flex items-center gap-6 flex-grow shrink-0 text-sm">
        
        <!-- Borde -->
        <div class="flex items-center gap-2">
          <label for="strokeColor" class="font-medium text-zinc-300 flex items-center gap-1.5">
            <i data-lucide="palette" class="w-4 h-4"></i> Borde
          </label>
          <div class="relative w-7 h-7 rounded-full overflow-hidden border border-white/20">
            <input type="color" id="strokeColor" value="#000000" class="absolute -inset-2 w-12 h-12 cursor-pointer">
          </div>
        </div>

        <!-- Relleno -->
        <div class="flex items-center gap-2">
          <label for="fillColor" class="font-medium text-zinc-300 flex items-center gap-1.5">
            <i data-lucide="paint-bucket" class="w-4 h-4"></i> Relleno
          </label>
          <div class="flex items-center gap-2">
            <label class="flex items-center gap-1 text-xs text-zinc-400 cursor-pointer hover:text-white" title="Transparente">
              <input type="checkbox" id="fillTransparent" checked class="rounded border-zinc-600 bg-zinc-800 text-purple-500 focus:ring-purple-500/50">
              Vacío
            </label>
            <div class="relative w-7 h-7 rounded-full overflow-hidden border border-white/20">
              <input type="color" id="fillColor" value="#ffffff" class="absolute -inset-2 w-12 h-12 cursor-pointer disabled:opacity-50">
            </div>
          </div>
        </div>

        <!-- Grosor (Dynamic) -->
        <div id="strokeWidthContainer" class="flex items-center gap-2">
          <label for="strokeWidth" class="font-medium text-zinc-300 flex items-center gap-1.5">
            <i data-lucide="scaling" class="w-4 h-4"></i> Grosor
          </label>
          <input type="range" id="strokeWidth" min="1" max="50" value="3" class="w-24 accent-purple-500 cursor-pointer">
          <span id="strokeWidthVal" class="text-xs font-mono text-zinc-400 w-8">3px</span>
        </div>

        <!-- Eraser Width (Dynamic) -->
        <div id="eraserWidthContainer" class="hidden items-center gap-2">
          <label for="eraserWidth" class="font-medium text-zinc-300 flex items-center gap-1.5">
            <i data-lucide="eraser" class="w-4 h-4"></i> Tamaño Goma
          </label>
          <input type="range" id="eraserWidth" min="5" max="150" value="30" class="w-24 accent-white cursor-pointer">
          <span id="eraserWidthVal" class="text-xs font-mono text-zinc-400 w-10">30px</span>
        </div>

        <div class="w-px h-6 bg-white/10 mx-1 shrink-0"></div>

        <!-- Texto -->
        <div id="textPropsContainer" class="flex items-center gap-4">
          <div class="flex items-center gap-2">
            <label for="textSize" class="font-medium text-zinc-300 flex items-center gap-1.5">
              <i data-lucide="type" class="w-4 h-4"></i> Texto
            </label>
            <input type="range" id="textSize" min="10" max="150" value="40" class="w-24 accent-purple-500 cursor-pointer">
            <span id="textSizeVal" class="text-xs font-mono text-zinc-400 w-10">40px</span>
          </div>
          <label class="flex items-center gap-1.5 text-xs text-zinc-400 cursor-pointer hover:text-white transition-colors" title="Tamaño fijo para el Lápiz Mágico">
            <input type="checkbox" id="fixedTextSize" class="rounded border-zinc-600 bg-zinc-800 text-purple-500 focus:ring-purple-500/50">
            Fijo
          </label>
        </div>

      </div>

      <div class="w-px h-6 bg-white/10 mx-4 shrink-0"></div>

      <!-- Right: Actions -->
      <div class="flex items-center gap-1 shrink-0">
        <button id="btnUndo" class="p-2 text-zinc-400 hover:text-white hover:bg-white/10 rounded-xl transition-colors disabled:opacity-30 disabled:hover:bg-transparent" title="Deshacer (Ctrl+Z)">
          <i data-lucide="undo-2" class="w-4 h-4"></i>
        </button>
        <button id="btnRedo" class="p-2 text-zinc-400 hover:text-white hover:bg-white/10 rounded-xl transition-colors disabled:opacity-30 disabled:hover:bg-transparent" title="Rehacer (Ctrl+Y)">
          <i data-lucide="redo-2" class="w-4 h-4"></i>
        </button>
        
        <div class="w-px h-6 bg-white/10 mx-2"></div>
        
        <button id="btnNew" class="px-3 py-1.5 text-sm font-medium text-red-400 hover:text-red-300 hover:bg-red-400/10 rounded-xl transition-colors">
          Limpiar
        </button>
        <button id="btnSave" class="px-3 py-1.5 text-sm font-medium bg-white text-black hover:bg-gray-200 rounded-xl transition-colors ml-1 shadow-sm flex items-center gap-1.5">
          <i data-lucide="download" class="w-3 h-3"></i> Exportar
        </button>
      </div>
    </header>

    <!-- Main Toolbar Dock (Bottom Center) -->
    <div class="fixed bottom-6 left-1/2 -translate-x-1/2 z-20 pointer-events-none">
      <div class="glass-panel rounded-full p-2 flex items-center gap-1.5 pointer-events-auto">
        
        <!-- Tools -->
        <button id="btnSelect" class="tool-btn p-3 rounded-full text-zinc-400 hover:text-white hover:bg-white/10 transition-all flex flex-col items-center gap-1 group" title="Seleccionar">
          <i data-lucide="mouse-pointer-2" class="w-5 h-5 group-hover:scale-110 transition-transform"></i>
        </button>
        <button id="btnPencil" class="tool-btn p-3 rounded-full bg-white/10 text-white shadow-sm transition-all flex flex-col items-center gap-1 group" title="Lápiz Normal">
          <i data-lucide="pen-line" class="w-5 h-5 group-hover:scale-110 transition-transform"></i>
        </button>
        <button id="btnEraser" class="tool-btn p-3 rounded-full text-zinc-400 hover:text-white hover:bg-white/10 transition-all flex flex-col items-center gap-1 group" title="Goma de Borrar">
          <i data-lucide="eraser" class="w-5 h-5 group-hover:scale-110 transition-transform"></i>
        </button>

        <div class="w-px h-8 bg-white/10 mx-1"></div>

        <!-- Shapes -->
        <button id="btnLine" class="tool-btn p-3 rounded-full text-zinc-400 hover:text-white hover:bg-white/10 transition-all group" title="Línea">
          <i data-lucide="minus" class="w-5 h-5 group-hover:scale-110 transition-transform"></i>
        </button>
        <button id="btnRect" class="tool-btn p-3 rounded-full text-zinc-400 hover:text-white hover:bg-white/10 transition-all group" title="Rectángulo">
          <i data-lucide="square" class="w-5 h-5 group-hover:scale-110 transition-transform"></i>
        </button>
        <button id="btnCircle" class="tool-btn p-3 rounded-full text-zinc-400 hover:text-white hover:bg-white/10 transition-all group" title="Círculo">
          <i data-lucide="circle" class="w-5 h-5 group-hover:scale-110 transition-transform"></i>
        </button>
        <button id="btnTriangle" class="tool-btn p-3 rounded-full text-zinc-400 hover:text-white hover:bg-white/10 transition-all group" title="Triángulo">
          <i data-lucide="triangle" class="w-5 h-5 group-hover:scale-110 transition-transform"></i>
        </button>
        <button id="btnArrow" class="tool-btn p-3 rounded-full text-zinc-400 hover:text-white hover:bg-white/10 transition-all group" title="Flecha">
          <i data-lucide="arrow-up-right" class="w-5 h-5 group-hover:scale-110 transition-transform"></i>
        </button>
        <button id="btnText" class="tool-btn p-3 rounded-full text-zinc-400 hover:text-white hover:bg-white/10 transition-all group" title="Texto">
          <i data-lucide="type" class="w-5 h-5 group-hover:scale-110 transition-transform"></i>
        </button>

        <div class="w-px h-8 bg-white/10 mx-1"></div>

        <!-- Magic Pen -->
        <button id="btnMagic" class="tool-btn px-6 py-3 ml-1 rounded-full bg-gradient-to-r from-purple-500 to-indigo-500 text-white font-bold shadow-lg shadow-purple-500/30 hover:shadow-purple-500/50 hover:from-purple-400 hover:to-indigo-400 transition-all flex items-center gap-2 group" title="Lápiz Mágico: Dibuja formas o escribe a mano y la IA lo perfecciona">
          <i data-lucide="wand-2" class="w-5 h-5 group-hover:rotate-12 transition-transform"></i>
          <span>Mágico</span>
        </button>

      </div>
    </div>

    <script type="module" src="/main.js"></script>
    <script>
      // Initialize Lucide icons
      lucide.createIcons();
    </script>
  </body>
</html>
